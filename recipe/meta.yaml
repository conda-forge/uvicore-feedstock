{% set name = "uvicore" %}
{% set version = "0.4.2" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/uvicore-{{ version }}.tar.gz
  sha256: 1394fc06dbb1626f920358d6f009f9d2b7a0b04a2010f14a6944def5a5019f54

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - poetry-core >=1.0.0
  run:
    - annotated-types ==0.7.0
    - argon2-cffi-bindings ==25.1.0
    - certifi ==2026.6.17
    - cffi ==2.0.0
    - colorful ==0.5.8
    - exceptiongroup ==1.3.1
    - h11 ==0.16.0
    - httpcore ==1.0.9
    - idna ==3.18
    - markupsafe ==3.0.3
    - marshmallow ==4.3.0
    - pycparser ==3.0
    - pydantic-core ==2.46.4
    - pygments ==2.20.0
    - python-dotenv ==1.2.2
    - typing-inspection ==0.4.2
    - typing_extensions ==4.15.0
    - jinja2 ==3.1.6
    - aiohttp ==3.11.*
    - anyio ==4.14.0
    - argon2-cffi ==25.1.0
    - colored ==2.3.2
    - cryptography ==49.0.0
    - environs ==15.0.1
    - httpx ==0.28.1
    - merge-args ==0.1.5
    - prettyprinter ==0.18.0
    - python >={{ python_min }},<4.0
    - pydantic ==2.13.4

test:
  imports:
    - uvicore
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/uvicore/framework
  summary: The Async Python Framework for Artisans. An Elegant Fullstack Python Web, API and CLI Framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
